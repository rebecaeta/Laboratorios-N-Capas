name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y correr tests de Mockito
        run: ./mvnw clean verify -B

  smoke-test:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crear .env temporal para el smoke test
        run: |
          cat <<EOF > .env
          DATABASE_NAME=laboratorio2_db
          DATABASE_USERNAME=ci_user
          DATABASE_PASSWORD=ci_password_temporal
          EOF

      - name: Levantar contenedores
        run: docker compose up -d --build

      - name: Verificar que la app responde
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8080/api/pirates; then
              echo "App respondiendo correctamente"
              exit 0
            fi
            echo "Intento $i: esperando..."
            sleep 5
          done
          echo "La app no respondió a tiempo"
          docker compose logs
          exit 1

      - name: Apagar contenedores
        if: always()
        run: docker compose down -v